openapi: 3.0.3
info:
  title: Projeto de locadora de filmes
  description: API destinada a controle de locadora
  termsOfService: http://swagger.io/terms/
  version: 1.0.0
externalDocs:
  description: Find out more about Swagger
  url: http://swagger.io
servers:
  - url: http://
paths:
  #-------------- FILME -------------- 
  /v1/locadora/filme:
    post:
      tags:
        - filme
      summary: Adiciona um novo Filme
      description: Adiciona um novo Filme
      requestBody:
        description: JSON contendo os dados do novo filme a ser inserido no banco
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Filme'
        required: true
      responses:
        '201':
          description: Successful operation
        '400':
          description: Invalid input
        '500':
          description: Error model/controller
        '415' :
          description: Unsuported media type
  /v1/locadora/filmebyid/{id}:
    get:
      tags:
        - filme
      summary: Busca um filme pelo ID
      description: Retorna um filme pelo ID
      parameters:
        - name: id
          in: path
          description: ID para retornar o filme
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Filme'          
        '400':
          description: Envalid ID supplied
        '404':
          description: Filme not found
        '500':
          description: Error model/controller
  /v1/locadora/todosfilmes:
    get:
      tags:
        - filme
      summary: Listar todos os filmes
      description: Listagem de todos os filmes registrados no sistema
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Filme'          
           
        '404':
          description: Not Found
        '500':
          description: error model/controller
  /v1/locadora/filme/{id}:
    put:
      tags:
        - filme
      summary: Atualizar um filme pelo ID
      description: Atualizar um filme pelo ID
      parameters:
        - name: id
          in: path
          description: ID para localizar e atualizar o filme
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        description: Dados para atualizar o filme
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Filme'
        required: true
      responses:
        '200':
          description: Successful operation
        '400':
          description: Invalid ID supplied
        '404':
          description: ID not found
        '500':
          description: Error model/controller
    delete:
      tags:
        - filme
      summary: Delete filme
      description: Excluir um filme pelo id
      parameters:
        - name: id
          in: path
          description: ID para localizar um filme
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Successful operation
        '400':
          description: Invalid ID supplied
        '404':
          description: ID not found
