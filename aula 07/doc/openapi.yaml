components:
  schemas:
    Filme:
      required:
        - nome
        - data_lancamento
        - duracao
        - sinopse
        - valor

      type: object
      properties:
        id:
          type: integer
        nome:
          type: string
        sinopse:
          type: string
        data_lancamento:
          type: string
        duracao:
          type: string
        valor:
          type: integer
        avaliacao:
          type: integer
        capa:
          type: string
    Classificacao:
      required:
        - classificao
      type: object
      properties:
        id:
          type: integer
        classificacao:
          type: string
    Ator:
      required:
        - nome
        - data_nascimento
        - data_inicio_carreira
      type: object
      properties:
        id:
          type: integer
        nome:
          type: string
        data_nascimento:
          type: string
        data_inicio_carreira:
          type: string
        data_falecimento:
          type: string
        data_termino_carreira:
          type: string
        biografia:
          type: string
    Diretor:
      required:
        - nome
        - data_nascimento
        - data_inicio_carreira
      type: object
      properties:
        id:
          type: integer
        nome:
          type: string
        data_nascimento:
          type: string
        data_inicio_carreira:
          type: string
        data_falecimento:
          type: string
        data_termino_carreira:
          type: string
        biografia:
          type: string
    Genero:
      required:
        - genero
      type: object
      properties:
        id:
          type: integer
        genero:
          type: string
    Nacionalidade:
      required:
        - pais
        - sigla
      type: object
      properties:
        id:
          type: integer
        pais:
          type: string
        sigla:
          type: string
    Atividade:
      required:
        - atividade
      type: object
      properties:
        id:
          type: integer
        atividade:
          type: string
    
  requestBodies:
    Filme:
      description: Objeto que deve ser enviado no Body das requisicoes com os dados do filme
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Filme'
    Classificacao: 
      description: Objeto que deve ser enviado no Body das requisicoes com os dados da classificacao
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Classificacao'
    Ator: 
      description: Objeto que deve ser enviado no Body das requisicoes com os dados do Ator
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Ator'
    Diretor: 
      description: Objeto que deve ser enviado no Body das requisicoes com os dados do Diretor
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Diretor'
    Genero: 
      description: Objeto que deve ser enviado no Body das requisicoes com os dados do Genero
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Genero'  
    Nacionalidade: 
      description: Objeto que deve ser enviado no Body das requisicoes com os dados da Nacionalidade
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Nacionalidade'
    Atividade: 
      description: Objeto que deve ser enviado no Body das requisicoes com os dados da Atividade
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Atividade'
